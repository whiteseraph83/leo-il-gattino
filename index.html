<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Leo il Gattino 🐱</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0d0d1a;
    overflow: hidden;
    font-family: 'Fredoka One', cursive;
  }
  #gameCanvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
    touch-action: none;
    cursor: pointer;
  }
  #portrait-wall {
    display: none;
    position: fixed;
    inset: 0;
    background: linear-gradient(145deg, #0d0d2b 0%, #1a0533 50%, #0d1a2b 100%);
    color: #fff;
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    text-align: center;
    padding: 40px;
  }
  #portrait-wall.show { display: flex; }
  .pw-icon {
    font-size: 80px;
    animation: phoneRot 2.2s ease-in-out infinite;
    display: block;
  }
  @keyframes phoneRot {
    0%,100% { transform: rotate(0deg); }
    45%,55% { transform: rotate(90deg); }
  }
  .pw-title {
    font-family: 'Fredoka One', cursive;
    font-size: 36px;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
  }
  .pw-sub {
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    opacity: 0.8;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="portrait-wall">
  <span class="pw-icon">📱</span>
  <div class="pw-title">Ruota il Telefono!</div>
  <div class="pw-sub">Gioca in modalità orizzontale 🐱<br>Leo ti aspetta!</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
(function() {
  var s = document.createElement("script");
  s.src = "game.js?v=" + Math.floor(Math.random() * 1e10);
  document.body.appendChild(s);
})();
</script>
</body>
</html>
